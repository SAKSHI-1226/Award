<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Digital Award</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- TOP CARD                  -->
    <!-- ========================= -->

    <section class="card museum-card">

        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <img id="awardImage"
             alt="Award">

        <h1 id="title"></h1>

        <div class="divider">

            <span></span>

            <i class="fa-solid fa-diamond"></i>

            <span></span>

        </div>

        <div id="details"
             class="details-table">

        </div>

    </section>


    <!-- ========================= -->
    <!-- SUMMARY CARD              -->
    <!-- ========================= -->

    <section class="card summary-card">

        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <h2>

            SUMMARY

        </h2>

        <div class="divider small-divider">

            <span></span>

            <i class="fa-solid fa-diamond"></i>

            <span></span>

        </div>

        <p id="summary">

        </p>

        <button id="listenBtn">

            <i class="fa-solid fa-volume-high"></i>

            Listen Summary

        </button>

    </section>


    <!-- Footer -->

    <footer>

        <div class="footer-chip">

            <i class="fa-solid fa-globe"></i>

            <span id="website">

                sakshi-1226.github.io

            </span>

        </div>

    </footer>

</div>


<!-- DATA -->

<script src="awardData.js"></script>

<!-- PAGE LOGIC -->

<script src="script.js"></script>

</body>

</html>
